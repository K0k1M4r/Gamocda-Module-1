<!-- Main section -->

     <main class="player-container">
        <div class="blured-backgound"></div>

        <div class="songpage-wrapper">

            <header class="track-header">
                <div class="album-pic">
                    <img src="assets/images/imgs/btr.png" alt="btr album photo">
                </div>

                <div class="track-info">
                    <h1 class="track-title">No idea</h1>

                    <div class="info-row">
                        <span class="artist-name"><img class="info-icon" src="assets/images/Icons-large/Name=Artist, Filled=No.svg" alt="artist icon"> Big Time Rush</span>
                        <span class="dot"></span>
                        <span class="album-name"><img class="info-icon" src="assets/images/Icons-large/Name=Album, Filled=No.svg" alt="album icon">Elevate</span>
                        <span class="dot"></span>
                        <span class="adt-info">2011</span> //as aditional info
                        <span class="dot"></span>
                        <span class="adt-info">4:59</span>
                        <span class="dot"></span>
                        <span class="adt-info">2,659,263</span>
                        <span class="dot"></span>
                    </div>

                    <div class="icon-bar">
                        <button class="icon-btn">
                            <img src="assets/images/Icons-large/Name=Play, Filled=No.svg" alt="playing">
                        </button>


                        <button class="icon-btn">
                            <img src="assets/images/Icons-large/Name=Like, Filled=No.svg" alt="like">
                        </button>


                        <button class="icon-btn">
                            <img src="assets/images/Icons-large/Name=Playlist, Filled=No.svg" alt="playlist">
                        </button>


                        <button class="icon-btn">
                            <img src="assets/images/Icons-large/Name=Add to Queue, Filled=No.svg" alt="add to queue">
                        </button>

                        <button class="icon-btn">
                            <img src="assets/images/Icons-large/Name=Download, Filled=No.svg" alt="download">
                        </button>

                        <button class="icon-btn">
                            <img src="assets/images/Icons-large/Name=Share, Filled=No.svg" alt="share">
                        </button>

                        <button class="icon-btn">
                            <img src="assets/images/Icons-large/Name=More, Filled=No.svg" alt="more">
                        </button>

                    </div>

                    <div class="genres">
                        <span class="genre">Funk</span>
                        <span class="genre">Electronic music</span>
                        <span class="genre">Disco</span>
                        <span class="genre">Soft Rock</span>
                        <span class="genre">Progressive pop</span>
                    </div>


                    <div class="artist-list">
                        <div class="sub-artist">
                            <img class="img-subartist" src="assets/images/imgs/james.png" alt="james maslow" >
                            <div class="names">
                                <p class="name">James Maslow</p>
                                <p class="role">Main artist</p>
                            </div>
                        </div>

                        <div class="sub-artist">
                            <img class="img-subartist" src="assets/images/imgs/carlos.png" alt="carlos" >
                            <div class="names">
                                <p class="name">Carlos PenaVega</p>
                                <p class="role">Main artist, Lyricist</p>
                            </div>
                        </div>

                        <div class="sub-artist">
                            <img class="img-subartist" src="assets/images/imgs/kendal.png" alt="Kendal" >
                            <div class="names">
                                <p class="name">Kendal Schmidt</p>
                                <p class="role">Main artist, Composer</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
        </div>
    </div>
     </main>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/fonts/fonts.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Koki -->
    <!-- desctop header -->
     <header class="header">
            
        
            
            <!-- header nav buttons and search input -->
            
            <div class="header-nav">
                <button><img src="./assets/images/Icons-large/library.svg" alt="">My Library</button>
                <button><img src="./assets/images/Icons-large/house no hover.svg" alt="">Home</button>
                <button><img src="./assets/images/Icons-large/star discover.svg" alt="">Discover</button>
                
                <div class="search-container">
                <img src="./assets/images/Icons-large/magnifing glass.svg" alt="">
                <input type="search" placeholder="Search">
                </div>
            
            </div>



            <div class="header-action-icons">
                <ul>
                    <li><img src="./assets/images/Icons-large/bell.svg" alt=""></li>
                    <li><img src="./assets/images/Icons-large/lock.svg" alt=""></li>
                    <li><img src="./assets/images/Icons-large/group.svg" alt=""></li>
                    <li><img src="./assets/images/Icons-large/settings.svg" alt=""></li>
                    <li><img src="./assets/images/Icons-large/profile icon.svg" alt=""></li>
                </ul>
            </div>
        
     </header>
    


     <!-- nutsa -->
     <!-- sidebar -->
     <aside class="sidebar">
        <div class="sidebar-content">

            <!-- My Library start -->
            <div class="sidebar-items">
                <div class="sidebar__library-btn sidebar-item">
                    <img src="assets/images/Icons-large/Name=Library, Filled=No.svg" class="icon" alt="albums icon">
                    <span class="item-label">My Library</span>
                </div>
            </div>
            <!-- My Library end -->

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Pin, Filled=No.svg" class="icon" alt="pin icon">
                    <span class="item-label">Pins</span>
                </div>
                <img src="assets/images/Icons-large/Name=Right, Filled=No.svg" class="sidebar-arrow" class="sidebar arrow">
            </div>


            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Playlist, Filled=No.svg" class="icon" alt="playlist icon">
                    <span class="item-label">Playlists</span>
                </div>
                <img src="assets/images/Icons-large/Name=Right, Filled=No.svg" class="sidebar-arrow" class="sidebar arrow">
            </div>

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Like, Filled=No.svg" class="icon" alt="liked song icon">
                    <span class="item-label">Liked songs</span>
                </div>
            </div>

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Save, Filled=No.svg" class="icon" alt="saved icon">
                    <span class="item-label">Saves</span>
                </div>
            </div>

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Album, Filled=No.svg" class="icon" alt="albums icon">
                    <span class="item-label">Albums</span>
                </div>
            </div>

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Folder, Filled=No.svg" class="icon" alt="Folders icon">
                    <span class="item-label">Folders</span>
                </div>
            </div>

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Podcast, Filled=No.svg" class="icon" alt="podcasts icon">
                    <span class="item-label">Podcasts</span>
                </div>
            </div>

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Audiobook, Filled=No.svg" class="icon" alt="audiobooks icon">
                    <span class="item-label">Audiobooks</span>
                </div>
            </div>

            <div class="sidebar-items">
                <div class="sidebar-item">
                    <img src="assets/images/Icons-large/Name=Artist, Filled=No.svg" class="icon" alt="artists icon">
                    <span class="item-label">Artists</span>
                </div>
            </div>
        </div>
     </aside>


    <!-- Main section -->
     <main>

        <!-- Home section -->
        <div class="card">test</div>
        <div class="card">test</div>
        <div class="card">test</div>
       
     
     </main>
     
        <!-- davit -->

     <!-- <Player> -->
    
        <div class="control-bar">

    <!-- Прогресс-бар снизу (мобильный) -->
    <div class="progress-bar progress-bar--mobile">
        <div class="progress-bar__fill"></div>
    </div>

    <div class="control-left">

        <div class="player">
            <button class="player__pause"><img src="./assets/images/Icons-large/Name=Pause, Filled=No.svg" alt="Pause"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Prev, Filled=No.svg" alt="Previous"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Next, Filled=No.svg" alt="Next"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Shuffle, Filled=No.svg" alt="Shuffle"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Loop, Filled=No.svg" alt="Loop"></button>
        </div>

    </div>

    <div class="track-meta">

        <div class="player__progress">
            <time class="track-time">2:23</time>
            <div class="progress-bar">
                <div class="progress-bar__fill"></div>
            </div>
            <time class="track-time">4:45</time>
        </div>

            <img class="track-picture" src="./assets/images/helmet.png" alt="Track picture">
            <div class="track-info">
                <span class="track-info-title">Get Lucky</span>
                <span class="track-info-singer">Daft Punk</span>
                <span class="track-info-album">Random Access Memories</span>
            </div>
    </div>

    <div class="control-right">

        <div class="global">
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Like, Filled=No.svg" alt="Like"></button>
            <button class="player__btn add-btn"><img src="./assets/images/Icons-large/Name=Add to Playlist, Filled=No.svg" alt="Add to Playlist"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Lyrics, Filled=No.svg" alt="Lyrics"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Device, Filled=No.svg" alt="Device"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Volume, Filled=No.svg" alt="Volume"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=More, Filled=No.svg" alt="More"></button>
            <button class="responsive-play-btn"><img src="./assets/images/Icons-large/Name=Play Simple, Filled=No.svg" alt="Play"></button>
        </div>

        <div class="additions">
            <button class="player__ai"><img src="./assets/images/Icons-large/ai.png" alt="AI"></button>
            <button class="player__btn"><img src="./assets/images/Icons-large/Name=Add to Queue, Filled=No.svg" alt="Queue"></button>
        </div>

    </div>

</div>
<!-- </player> -->

    

</body>
</html>
